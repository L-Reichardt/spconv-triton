# Version/support matrix for spconv-Triton (GPU required, host-bound).
#
# Run through uv so interpreters are auto-provisioned and installs are fast:
#   uvx --with tox-uv tox                    # default: CUDA unit matrix (NVIDIA)
#   uvx --with tox-uv tox -m rocm            # AMD/ROCm unit matrix
#   uvx --with tox-uv tox -e py310-torch24-cuda            # one combo
#   uvx --with tox-uv tox -e py314-torch213-cuda -- -k conv  # subset of the suite
#   uvx --with tox-uv tox -e integration     # C3D parity, CUDA (slow, opt-in)
#   uvx --with tox-uv tox -e integration-rocm
#   uvx --with tox-uv tox -e benchmark -- python scripts/bench_layers.py --name rtx3060
#   SPCONV_TEST_IMPL=spconv uvx --with tox-uv tox -e benchmark -- \
#       pytest tests/ -q -p no:cacheprovider -m "not integration"
#
# Support claims pinned by this matrix (registry-verified 2026-07-09):
#   python 3.10 (package floor: zip(strict=), functools.cache) .. 3.14 (torch
#   ships a cp315 wheel but its triton dependency marker still caps at
#   python_version<'3.15', so 3.15 gets no triton and can't run yet), torch 2.4
#   (floor) .. 2.13 (current). The unit rows test
#   the corners plus midpoints — python-minor breakage for a pure-Python +
#   Triton package is monotonic (syntax floors old, deprecations new), so the
#   extremes bound it; torch rows straddle the 2.5 amp-API boundary in
#   pytorch/functional.py (torch<2.5 -> torch.cuda.amp legacy branch).
#   Each torch pin pulls ITS OWN exact triton via torch's wheel metadata
#   (CUDA: `triton`, ROCm: `pytorch-triton-rocm` — both import as `triton`),
#   and a bundled GPU runtime per row (cu121/cu128/cu130, rocm6.1/6.4/7.2 =
#   the PyPI-default CUDA / newest ROCm per release). torch 2.13's cu130 build
#   is what `uv --torch-backend=auto` selects on a cu13 driver, so the explicit
#   pin below just makes that choice reproducible across hosts.
#
# Backend choice is host-bound: an NVIDIA box runs the cuda rows, an AMD box the
# rocm rows (commands_pre fails fast with gpu-ok False on the wrong host — GPU
# containers inject the host driver too, so there is no way to cross-test).
# The frozen suite runs against committed golden data; NO env here installs
# reference spconv except `benchmark`, the single opt-in env for the three
# spconv-dependent tasks (benchmarks, SPCONV_TEST_IMPL=spconv re-validation,
# golden regeneration). spconv is unmaintained (last release 2024-12: cp39-cp313,
# nothing past CUDA 12.6), so it pins the cu126 golden-provenance build and can
# never follow the matrix.

[tox]
requires =
    tox>=4.22
    tox-uv>=1.20
env_list = py314-torch213-cuda, py312-torch28-cuda, py310-torch24-cuda
labels =
    cuda = py314-torch213-cuda, py312-torch28-cuda, py310-torch24-cuda
    rocm = py314-torch213-rocm, py312-torch28-rocm, py310-torch24-rocm

[testenv]
description = frozen unit suite on one python/torch/runtime combo
package = wheel
deps =
    pytest
    # Older triton/torch pins (e.g. triton==3.0.0 bundled by torch==2.4.1) don't
    # declare setuptools as a dependency, yet triton's backend auto-discovery
    # (triton/backends/__init__.py) unconditionally imports every backend's
    # driver.py -- including AMD's, which needs setuptools at import time even
    # on a CUDA host. uv-provisioned venvs never auto-seed setuptools like
    # legacy virtualenv/venv did, so pin it explicitly for every row rather
    # than relying on it being pulled in transitively by torch's own metadata
    # (which only some rows happen to declare).
    setuptools
    torch213-cuda: torch==2.13.0+cu130
    torch28-cuda: torch==2.8.0+cu128
    torch24-cuda: torch==2.4.1+cu121
    torch213-rocm: torch==2.13.0+rocm7.2
    torch28-rocm: torch==2.8.0+rocm6.4
    torch24-rocm: torch==2.4.1+rocm6.1
set_env =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD = 1
    # The +cuNNN/+rocmX.Y local versions live only on the PyTorch index;
    # unsafe-best-match lets torch resolve there while pytest/numpy come from
    # PyPI. UV_NO_CONFIG keeps this repo's uv files out of the env installs.
    UV_NO_CONFIG = 1
    UV_INDEX_STRATEGY = unsafe-best-match
    # Pin UV_TORCH_BACKEND per row to override any host-level default (the CUDA
    # base image bakes UV_TORCH_BACKEND=cu128 into /etc/environment, and tox-uv
    # auto-passes UV_* into the env). uv's torch-backend selection takes
    # precedence over UV_EXTRA_INDEX_URL, so an inherited cu128 would force every
    # row's torch to resolve from the cu128 index and make the +cu130/+cu121 (and
    # rocm) pins unsatisfiable. Setting it to the row's backend keeps resolution
    # matched to the index below.
    torch213-cuda: UV_TORCH_BACKEND = cu130
    torch28-cuda: UV_TORCH_BACKEND = cu128
    torch24-cuda: UV_TORCH_BACKEND = cu121
    torch213-rocm: UV_TORCH_BACKEND = rocm7.2
    torch28-rocm: UV_TORCH_BACKEND = rocm6.4
    torch24-rocm: UV_TORCH_BACKEND = rocm6.1
    torch213-cuda: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu130
    torch28-cuda: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu128
    torch24-cuda: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu121
    torch213-rocm: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/rocm7.2
    torch28-rocm: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/rocm6.4
    torch24-rocm: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/rocm6.1
pass_env =
    TRITON_CACHE_DIR
commands_pre =
    python -c 'import torch, triton; ok = torch.cuda.is_available(); print("torch", torch.__version__, "| triton", triton.__version__, "| cuda", torch.version.cuda, "| hip", torch.version.hip, "| gpu-ok", ok, "| device", torch.cuda.get_device_name(0) if ok else "NONE"); assert ok, "GPU failed to init: wrong backend family for this host, or host driver older than this torch runtime"'
commands =
    pytest tests/ -q -p no:cacheprovider {posargs:-m "not integration"}

# Empty sections so `tox -e <rocm row>` resolves (tox only accepts -e targets
# from env_list or declared sections; the factor conditionals above still apply).
[testenv:py314-torch213-rocm]
[testenv:py312-torch28-rocm]
[testenv:py310-torch24-rocm]

# --- C3D backbone integration parity (slow: 200 scans + one-time autotune) ---
# CUDA env pins the golden-provenance build (the C3D golden was generated ONCE
# on torch 2.12.0+cu126; near-bit-exact per-point parity is only meaningful on
# that same runtime — sweeping the matrix would only inject fp drift).

[testenv:integration]
description = C3D backbone parity on the cu126 golden-provenance build (NVIDIA)
base_python = python3.12
package = wheel
deps =
    pytest
    torch==2.12.0+cu126
set_env =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD = 1
    UV_NO_CONFIG = 1
    UV_INDEX_STRATEGY = unsafe-best-match
    UV_TORCH_BACKEND = cu126
    UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu126
commands =
    pytest tests/integration -p no:cacheprovider -s {posargs}

[testenv:integration-rocm]
description = C3D backbone parity on the newest ROCm build (AMD)
base_python = python3.12
package = wheel
deps =
    pytest
    torch==2.12.1+rocm7.2
set_env =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD = 1
    UV_NO_CONFIG = 1
    UV_INDEX_STRATEGY = unsafe-best-match
    UV_TORCH_BACKEND = rocm7.2
    UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/rocm7.2
commands =
    pytest tests/integration -p no:cacheprovider -s {posargs}

# --- The ONLY env with reference spconv (CUDA-only; spconv is unmaintained) ---
# Serves all three spconv-dependent tasks on the cu126 golden-provenance stack:
#   benchmarks:      tox -e benchmark -- python scripts/bench_layers.py --name X
#   re-validation:   SPCONV_TEST_IMPL=spconv tox -e benchmark -- pytest tests/ ...
#   golden regen:    tox -e benchmark -- python tests/gen_golden.py   (human-approved only)
# spconv-cu126 declares no torch dep (CUDA linkage lives in cumm-cu126), so it
# rides on the pinned torch; pandas/tabulate back bench_layers.py's tables.

[testenv:benchmark]
description = reference spconv-cu126 env for benchmarks / re-validation / golden regen
base_python = python3.12
package = wheel
deps =
    pytest
    pandas
    tabulate
    spconv-cu126>=2.3.8
    torch==2.12.0+cu126
set_env =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD = 1
    UV_NO_CONFIG = 1
    UV_INDEX_STRATEGY = unsafe-best-match
    UV_TORCH_BACKEND = cu126
    UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu126
pass_env =
    TRITON_CACHE_DIR
    SPCONV_TEST_IMPL
commands =
    {posargs:python scripts/bench_layers.py --name local}
