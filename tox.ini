# Version/support matrix for spconv-Triton (GPU required, host-bound).
#
# Run through uv (auto-provisions interpreters):
#   uvx --with tox-uv tox                    # default: CUDA unit matrix (NVIDIA)
#   uvx --with tox-uv tox -m rocm            # AMD/ROCm unit matrix
#   uvx --with tox-uv tox -e py310-torch24-cuda             # one combo
#   uvx --with tox-uv tox -e py314-torch213-cuda -- -k conv # subset of the suite
#   uvx --with tox-uv tox -m warmcold        # cold-then-warm cache-persistence pair
#   SPCONV_TEST_IMPL=spconv uvx --with tox-uv tox -e benchmark -- \
#       pytest tests/ -q -p no:cacheprovider
#
# Rows test the support corners + midpoints: python 3.10 (floor) .. 3.14, torch
# 2.4 (floor) .. 2.13, which straddles the 2.5 amp-API boundary (torch<2.5 uses
# the torch.cuda.amp legacy branch in pytorch/functional.py). Each torch pin
# pulls its own matching triton and GPU runtime (CUDA cu121/128/130, ROCm
# rocm6.1/6.4/7.2). Host-bound: NVIDIA runs the cuda rows, AMD the rocm rows;
# commands_pre fails fast on the wrong host (no cross-testing). Only `benchmark`
# installs reference spconv (unmaintained, cu126-pinned): SPCONV_TEST_IMPL=spconv
# re-validation and golden regen.

[tox]
requires =
    tox>=4.22
    tox-uv>=1.20
env_list = py314-torch213-cuda, py312-torch28-cuda, py310-torch24-cuda
labels =
    cuda = py314-torch213-cuda, py312-torch28-cuda, py310-torch24-cuda
    rocm = py314-torch213-rocm, py312-torch28-rocm, py310-torch24-rocm
    warmcold = py314-torch213-cuda-cold, py314-torch213-cuda-warm

[testenv]
description = frozen unit suite on one python/torch/runtime combo
package = wheel
deps =
    pytest
    # Pin setuptools: older triton pins don't declare it, but triton's backend
    # auto-discovery imports AMD's driver.py (needs setuptools) even on a CUDA
    # host, and uv venvs don't auto-seed it.
    setuptools
    torch213-cuda: torch==2.13.0+cu130
    torch28-cuda: torch==2.8.0+cu128
    torch24-cuda: torch==2.4.1+cu121
    torch213-rocm: torch==2.13.0+rocm7.2
    torch28-rocm: torch==2.8.0+rocm6.4
    torch24-rocm: torch==2.4.1+rocm6.1
set_env =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD = 1
    # unsafe-best-match: torch resolves from the PyTorch index, pytest/numpy from
    # PyPI. UV_NO_CONFIG ignores this repo's uv files.
    UV_NO_CONFIG = 1
    UV_INDEX_STRATEGY = unsafe-best-match
    # Pin the backend per row: uv's torch-backend selection outranks
    # UV_EXTRA_INDEX_URL, so an inherited host default (e.g. cu128) would make the
    # +cu130/+cu121/rocm pins unsatisfiable.
    torch213-cuda: UV_TORCH_BACKEND = cu130
    torch28-cuda: UV_TORCH_BACKEND = cu128
    torch24-cuda: UV_TORCH_BACKEND = cu121
    torch213-rocm: UV_TORCH_BACKEND = rocm7.2
    torch28-rocm: UV_TORCH_BACKEND = rocm6.4
    torch24-rocm: UV_TORCH_BACKEND = rocm6.1
    torch213-cuda: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu130
    torch28-cuda: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu128
    torch24-cuda: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu121
    torch213-rocm: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/rocm7.2
    torch28-rocm: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/rocm6.4
    torch24-rocm: UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/rocm6.1
    # TF32 on AMD needs this + torch>=2.7 (MI300/gfx94x via hipblaslt). Harmless
    # elsewhere: test_tf32.py still probes and skips, and allow_tf32 stays False.
    rocm: HIPBLASLT_ALLOW_TF32 = 1
    # Cold/warm pair (tox -m warmcold): a shared cache dir under {toxworkdir}.
    # set_env overrides the host TRITON_CACHE_DIR so the pair is isolated; cold
    # wipes+fills it (commands_pre), warm reuses it and asserts no recompilation.
    cold: TRITON_CACHE_DIR = {toxworkdir}{/}triton-cache-shared
    warm: TRITON_CACHE_DIR = {toxworkdir}{/}triton-cache-shared
    warm: SPCONV_TEST_EXPECT_WARM = 1
pass_env =
    TRITON_CACHE_DIR
commands_pre =
    python -c 'import torch, triton; ok = torch.cuda.is_available(); print("torch", torch.__version__, "| triton", triton.__version__, "| cuda", torch.version.cuda, "| hip", torch.version.hip, "| gpu-ok", ok, "| device", torch.cuda.get_device_name(0) if ok else "NONE"); assert ok, "GPU failed to init: wrong backend family for this host, or host driver older than this torch runtime"'
    # cold only: wipe the shared cache so the run compiles from scratch.
    cold: python -c 'import os, shutil; shutil.rmtree(os.environ["TRITON_CACHE_DIR"], ignore_errors=True)'
commands =
    pytest tests/ -q -p no:cacheprovider {posargs}

# Empty sections so `tox -e <rocm row>` resolves (factor conditionals still apply).
[testenv:py314-torch213-rocm]
[testenv:py312-torch28-rocm]
[testenv:py310-torch24-rocm]

# --- Cold/warm cache-persistence pair (newest CUDA row; tox -m warmcold) ---
# cold compiles from a wiped cache; warm reuses it in a fresh process and asserts
# zero recompilation (SPCONV_TEST_EXPECT_WARM=1 arms the conftest guard +
# test_zz_warm_cache.py). `depends` orders the pair; warm alone fails fast when
# the shared cache is missing.

[testenv:py314-torch213-cuda-cold]

[testenv:py314-torch213-cuda-warm]
depends = py314-torch213-cuda-cold

# --- The only env with reference spconv (CUDA-only, unmaintained, cu126-pinned).
# spconv-cu126 has no torch dep (CUDA linkage is in cumm-cu126), so it rides the
# pinned torch.

[testenv:benchmark]
description = reference spconv-cu126 env for SPCONV_TEST_IMPL=spconv re-validation / golden regen
base_python = python3.12
package = wheel
deps =
    pytest
    spconv-cu126>=2.3.8
    torch==2.12.0+cu126
set_env =
    PYTEST_DISABLE_PLUGIN_AUTOLOAD = 1
    UV_NO_CONFIG = 1
    UV_INDEX_STRATEGY = unsafe-best-match
    UV_TORCH_BACKEND = cu126
    UV_EXTRA_INDEX_URL = https://download.pytorch.org/whl/cu126
pass_env =
    TRITON_CACHE_DIR
    SPCONV_TEST_IMPL
commands =
    {posargs:pytest tests/ -q -p no:cacheprovider}
